name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t movie-converter .

      - name: Run convert.sh (Docker)
        run: |
          docker run --rm \
            -v "$(pwd)/tests/data:/input" \
            -v "$(pwd)/outputs:/output" \
            movie-converter /input /output
          test -d outputs
          test -f outputs/sample1.mp4
